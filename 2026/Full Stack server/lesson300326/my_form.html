<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>My Form Page</h1>
    
    <h2>Form using GET method:</h2>
    <form action="./form_result.php" method="get">
        <input name="fname" type="text" placeholder="Enter first name"> <br>
        <input name="lname" type="text" placeholder="Enter last name"> <br>
        <input name="age" type="number"> <br>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>

    <hr>

    <h2>Form using POST method:</h2>
    <form action="./form_result.php" method="post">
        <input name="fname" type="text" placeholder="Enter first name"> <br>
        <input name="lname" type="text" placeholder="Enter last name"> <br>
        <input name="age" type="number"> <br>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>
</body>
</html>
